<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiagent Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; }

        :root {
            --bg: #171717;
            --bg-sidebar: #171717;
            --border: #2e2e2e;
            --text: #ececec;
            --text-secondary: #9a9a9a;
            --text-tertiary: #666;
            --surface: #212121;
            --surface-hover: #2a2a2a;
            --accent: #ececec;
            --font: "Sora", system-ui, sans-serif;
            --mono: "JetBrains Mono", monospace;
            --sidebar-w: 260px;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            -webkit-font-smoothing: antialiased;
        }

        button, input, textarea { font: inherit; border: none; background: none; color: inherit; }
        button { cursor: pointer; }

        /* ── Layout ── */
        .app {
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            height: 100vh;
            transition: grid-template-columns .2s ease;
        }
        .app.collapsed { grid-template-columns: 0 1fr; }

        /* ── Sidebar ── */
        .sidebar {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--bg-sidebar);
            overflow: hidden;
            transition: opacity .18s ease;
            padding: 12px 10px;
            gap: 4px;
        }
        .app.collapsed .sidebar { opacity: 0; pointer-events: none; }

        .sidebar-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 4px 12px;
        }
        .sidebar-brand {
            font-size: .85rem;
            font-weight: 700;
            letter-spacing: -.02em;
        }

        .btn-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: background .15s, color .15s;
        }
        .btn-icon:hover { background: var(--surface); color: var(--text); }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 10px 10px;
            border-radius: 10px;
            font-size: .83rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: background .15s, color .15s;
        }
        .new-chat-btn:hover { background: var(--surface); color: var(--text); }

        .section-label {
            padding: 14px 10px 6px;
            font-size: .68rem;
            font-weight: 600;
            color: var(--text-tertiary);
            letter-spacing: .06em;
            text-transform: uppercase;
        }

        .conv-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .conv-list::-webkit-scrollbar { width: 4px; }
        .conv-list::-webkit-scrollbar-thumb { background: #333; border-radius: 99px; }

        .conv-item {
            width: 100%;
            text-align: left;
            padding: 9px 10px;
            border-radius: 8px;
            transition: background .12s;
        }
        .conv-item:hover { background: var(--surface); }
        .conv-item.active { background: var(--surface); }
        .conv-item-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .conv-item-title {
            flex: 1;
            font-size: .82rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-delete {
            width: 24px; height: 24px;
            border-radius: 6px;
            display: none;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            flex-shrink: 0;
            transition: background .12s, color .12s;
        }
        .conv-item:hover .conv-delete { display: inline-flex; }
        .conv-delete:hover { background: #3a2020; color: #e55; }
        .conv-item-time {
            font-size: .65rem;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .conv-empty {
            padding: 16px 10px;
            font-size: .8rem;
            color: var(--text-tertiary);
            line-height: 1.5;
        }

        /* ── Main ── */
        .main {
            display: grid;
            grid-template-rows: 1fr auto;
            min-height: 0;
            position: relative;
        }

        .toggle-btn {
            position: absolute;
            top: 14px; left: 14px;
            z-index: 10;
            height: 36px;
            padding: 0 12px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: .78rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: background .15s, color .15s;
        }
        .toggle-btn:hover { background: var(--surface); color: var(--text); }

        /* ── Messages ── */
        .thread { min-height: 0; overflow: hidden; padding-top: 56px; }
        .viewport {
            height: 100%;
            overflow-y: auto;
            padding: 20px 16px;
            scroll-behavior: smooth;
        }
        .viewport::-webkit-scrollbar { width: 6px; }
        .viewport::-webkit-scrollbar-thumb { background: #333; border-radius: 99px; }

        .column {
            max-width: 740px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-bottom: 16px;
        }

        /* ── Welcome ── */
        .welcome {
            margin: 14vh auto 0;
            text-align: center;
            max-width: 560px;
        }
        .welcome h1 {
            font-size: clamp(1.5rem, 3.2vw, 2.2rem);
            font-weight: 700;
            letter-spacing: -.04em;
            line-height: 1.15;
            margin-bottom: 10px;
        }
        .welcome p {
            color: var(--text-secondary);
            font-size: .9rem;
            line-height: 1.6;
        }

        /* ── Message ── */
        .msg {
            display: grid;
            grid-template-columns: 30px 1fr;
            gap: 12px;
            align-items: start;
        }
        .msg-avatar {
            width: 30px; height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .6rem;
            font-weight: 700;
            background: var(--surface);
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .msg.user .msg-avatar {
            background: var(--text);
            color: var(--bg);
        }
        .msg-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .msg-name { font-size: .82rem; font-weight: 600; }
        .msg-time { font-size: .7rem; color: var(--text-tertiary); }
        .msg-body {
            font-size: .92rem;
            line-height: 1.75;
            color: var(--text);
            word-break: break-word;
        }
        .msg-body p { margin: 0 0 .7em; }
        .msg-body p:last-child { margin: 0; }
        .msg-body strong { font-weight: 700; }
        .msg-body em { color: #bbb; }
        .msg-body ul, .msg-body ol { margin: .4em 0 .7em 1.2em; padding: 0; }
        .msg-body li { margin-bottom: .25em; }
        .msg-body code {
            padding: .15em .4em;
            border-radius: 5px;
            background: var(--surface);
            font-family: var(--mono);
            font-size: .85em;
        }
        .msg-body h1, .msg-body h2, .msg-body h3,
        .msg-body h4, .msg-body h5, .msg-body h6 {
            font-weight: 600;
            margin: .6em 0 .3em;
            line-height: 1.3;
        }
        .msg-body h1 { font-size: 1.3em; }
        .msg-body h2 { font-size: 1.15em; }
        .msg-body h3 { font-size: 1.05em; }
        .msg-body hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: .8em 0;
        }

        .code-block {
            margin: .8em 0;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #0d0d0d;
        }
        .code-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .code-lang { font-size: .7rem; color: var(--text-tertiary); font-family: var(--mono); }
        .copy-btn {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: .7rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background .12s, color .12s;
        }
        .copy-btn:hover { background: var(--surface-hover); color: var(--text); }
        .code-block pre {
            margin: 0;
            padding: 14px;
            font-size: .84rem;
            line-height: 1.6;
            font-family: var(--mono);
            color: #d4d4d4;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* ── Typing ── */
        .dots { display: inline-flex; gap: 5px; padding-top: 4px; }
        .dots span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--text-tertiary);
            animation: bounce 1.2s ease-in-out infinite;
        }
        .dots span:nth-child(2) { animation-delay: .15s; }
        .dots span:nth-child(3) { animation-delay: .3s; }
        @keyframes bounce {
            0%,100% { opacity: .25; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-4px); }
        }

        /* ── Composer ── */
        .composer-wrap {
            padding: 0 16px 16px;
        }
        .composer {
            max-width: 740px;
            margin: 0 auto;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--surface);
            overflow: hidden;
            transition: border-color .15s;
        }
        .composer:focus-within { border-color: #444; }
        .composer textarea {
            width: 100%;
            min-height: 44px;
            max-height: 140px;
            resize: none;
            outline: none;
            padding: 13px 14px 4px;
            background: transparent;
            font-size: .88rem;
            line-height: 1.45;
        }
        .composer textarea::placeholder { color: var(--text-tertiary); }
        .composer-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px 8px 14px;
        }
        .composer-hint {
            font-size: .65rem;
            color: var(--text-tertiary);
        }
        .send-btn {
            width: 34px; height: 34px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--text);
            color: var(--bg);
            transition: opacity .15s;
        }
        .send-btn:disabled { opacity: .3; cursor: default; }
        .send-btn:not(:disabled):hover { opacity: .85; }

        /* ── Scrim ── */
        .scrim { display: none; }

        /* ── Mobile ── */
        @media (max-width: 1080px) {
            .app, .app.collapsed { grid-template-columns: 1fr; }
            .sidebar {
                position: fixed;
                inset: 0 auto 0 0;
                width: min(80vw, 280px);
                z-index: 50;
                transform: translateX(-100%);
                transition: transform .2s ease;
                border-right: 1px solid var(--border);
            }
            .sidebar.open { transform: translateX(0); }
            .scrim {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,.5);
                z-index: 40;
            }
        }
        @media (max-width: 640px) {
            .thread { padding-top: 48px; }
            .toggle-btn { top: 10px; left: 10px; }
            .composer-wrap { padding: 0 10px 12px; }
            .msg { grid-template-columns: 26px 1fr; gap: 10px; }
            .msg-avatar { width: 26px; height: 26px; border-radius: 6px; font-size: .55rem; }
        }
    </style>
</head>
<body>
<div id="app">
    <div v-if="sidebarOpen && isMobile" class="scrim" @click="closeSidebar"></div>

    <div class="app" :class="{ collapsed: !sidebarOpen && !isMobile }">
        <aside class="sidebar" :class="{ open: sidebarOpen }">
            <div class="sidebar-top">
                <div class="sidebar-brand">Console</div>
                <button class="btn-icon" @click="toggleSidebar" title="Cerrar">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13 3 3 13M3 3l10 10"/></svg>
                </button>
            </div>

            <button class="new-chat-btn" @click="startNewConversation">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 2v12M2 8h12"/></svg>
                Nueva conversación
            </button>

            <div class="section-label">Recientes</div>

            <div class="conv-list">
                <template v-if="visibleConversations.length">
                    <button
                        v-for="c in visibleConversations"
                        :key="c.session_id"
                        class="conv-item"
                        :class="{ active: c.session_id === config.sessionId }"
                        @click="selectConversation(c.session_id)"
                    >
                        <div class="conv-item-row">
                            <div class="conv-item-title">{{ c.title || 'Nueva conversación' }}</div>
                            <span class="conv-delete" @click.stop="deleteConversation(c.session_id)" title="Eliminar">
                                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 4h8M5 4V3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1M10 4v7a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4"/></svg>
                            </span>
                        </div>
                        <div class="conv-item-time">{{ formatConversationTime(c.updated_at) }}</div>
                    </button>
                </template>
                <div v-else class="conv-empty">Aún no hay conversaciones. Empieza una nueva.</div>
            </div>
        </aside>

        <section class="main">
            <button class="toggle-btn" @click="toggleSidebar">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 12h12M2 6h12M2 12h12"/><path d="M2 4h12M2 8h12M2 12h12"/></svg>
                {{ sidebarOpen ? '' : 'Historial' }}
            </button>

            <div class="thread">
                <div class="viewport" ref="messageViewport">
                    <div class="column">
                        <section v-if="!messages.length" class="welcome">
                            <h1>¿En qué puedo ayudarte?</h1>
                            <p>Escribe un mensaje para empezar una conversación con el agente.</p>
                        </section>

                        <article
                            v-for="m in renderedMessages"
                            :key="m.localId"
                            class="msg"
                            :class="{ user: m.role === 'user' }"
                        >
                            <div class="msg-avatar">{{ m.role === 'user' ? 'U' : 'AI' }}</div>
                            <div>
                                <div class="msg-head">
                                    <div class="msg-name">{{ m.role === 'user' ? 'Tú' : 'Agente' }}</div>
                                    <div class="msg-time">{{ m.meta }}</div>
                                </div>
                                <div class="msg-body" v-html="m.role === 'assistant' ? renderMarkdown(m.content) : renderPlain(m.content)"></div>
                            </div>
                        </article>

                        <article v-if="typing" class="msg">
                            <div class="msg-avatar">AI</div>
                            <div>
                                <div class="msg-head">
                                    <div class="msg-name">Agente</div>
                                    <div class="msg-time">escribiendo…</div>
                                </div>
                                <div class="dots"><span></span><span></span><span></span></div>
                            </div>
                        </article>
                    </div>
                </div>
            </div>

            <footer class="composer-wrap">
                <div class="composer">
                    <textarea
                        ref="composerInput"
                        v-model="draft"
                        placeholder="Escribe un mensaje…"
                        @keydown.enter.exact.prevent="sendMessage"
                        @input="autoResize"
                    ></textarea>
                    <div class="composer-bottom">
                        <div class="composer-hint">{{ footerStatus }}</div>
                        <button class="send-btn" :disabled="!canSend" @click="sendMessage">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12-2 2V6l14-3-3 14-5-5"/><path d="m5 12 5-5"/></svg>
                        </button>
                    </div>
                </div>
            </footer>
        </section>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp, nextTick } = Vue;
const genId = () => `sess_${Math.random().toString(36).slice(2, 11)}`;

createApp({
    data() {
        return {
            config: {
                apiUrl: localStorage.getItem("apiUrl") || "http://localhost:8000",
                sessionId: localStorage.getItem("sessionId") || genId(),
                username: localStorage.getItem("username") || "",
                metadata: localStorage.getItem("metadata") || "{}"
            },
            conversations: [],
            messages: [],
            draft: "",
            typing: false,
            sidebarOpen: false,
            isMobile: window.innerWidth <= 1080,
            loadingConversation: false,
            sending: false
        };
    },
    computed: {
        currentTitle() {
            const a = this.conversations.find(c => c.session_id === this.config.sessionId);
            if (a?.title) return a.title;
            const first = this.messages.find(m => m.role === "user");
            return first?.content ? this.compact(first.content).slice(0, 60) : "Nueva conversación";
        },
        footerStatus() {
            if (this.sending) return "Generando respuesta…";
            if (this.loadingConversation) return "Cargando…";
            return "Enter enviar · Shift+Enter salto";
        },
        visibleConversations() {
            if (this.conversations.some(c => c.session_id === this.config.sessionId)) return this.conversations;
            return [{
                session_id: this.config.sessionId,
                title: this.currentTitle,
                preview: this.messages.length ? this.compact(this.messages.at(-1).content).slice(0, 110) : "",
                updated_at: new Date().toISOString()
            }, ...this.conversations];
        },
        renderedMessages() {
            return this.messages.map((m, i) => ({
                ...m,
                localId: m.id || `${m.role}-${i}`,
                meta: this.fmtTime(m.created_at)
            }));
        },
        canSend() { return !this.sending && !!this.draft.trim(); }
    },
    mounted() {
        this.restoreLayout();
        window.addEventListener("resize", this.onResize);
        this.boot();
    },
    beforeUnmount() { window.removeEventListener("resize", this.onResize); },
    methods: {
        save() {
            for (const k of ["apiUrl", "sessionId", "username", "metadata"])
                localStorage.setItem(k, this.config[k]);
        },
        restoreLayout() {
            if (this.isMobile) { this.sidebarOpen = false; return; }
            const s = localStorage.getItem("sidebarOpen");
            this.sidebarOpen = s === null ? true : s === "true";
        },
        onResize() {
            const m = window.innerWidth <= 1080;
            if (m !== this.isMobile) { this.isMobile = m; this.restoreLayout(); }
        },
        toggleSidebar() {
            this.sidebarOpen = !this.sidebarOpen;
            if (!this.isMobile) localStorage.setItem("sidebarOpen", String(this.sidebarOpen));
        },
        closeSidebar() { if (this.isMobile) this.sidebarOpen = false; },
        compact(v) { return String(v || "").replace(/\s+/g, " ").trim(); },
        esc(v) { return String(v || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); },
        renderPlain(v) { return `<p>${this.esc(v).replace(/\n/g, "<br>")}</p>`; },
        renderInline(v) {
            return v
                .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
                .replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, "<em>$1</em>")
                .replace(/`([^`]+)`/g, "<code>$1</code>");
        },
        renderMarkdown(raw) {
            let t = this.esc(raw);
            const blocks = [];
            t = t.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                const id = `c_${Math.random().toString(36).slice(2, 8)}`;
                blocks.push(`<div class="code-block"><div class="code-head"><div class="code-lang">${lang || "code"}</div><button class="copy-btn" onclick="window._copy('${id}',this)">Copiar</button></div><pre id="${id}"><code>${code.replace(/\n$/, "")}</code></pre></div>`);
                return `__CB${blocks.length - 1}__`;
            });
            const lines = t.split("\n");
            let html = "", i = 0;
            while (i < lines.length) {
                const tr = lines[i].trim();
                if (!tr) { i++; continue; }
                const ph = tr.match(/^__CB(\d+)__$/);
                if (ph) { html += blocks[+ph[1]]; i++; continue; }
                const hm = tr.match(/^(#{1,6})\s+(.+)$/);
                if (hm) { html += `<h${hm[1].length}>${this.renderInline(hm[2])}</h${hm[1].length}>`; i++; continue; }
                if (/^-{3,}$/.test(tr)) { html += "<hr>"; i++; continue; }
                if (/^[-*•]\s/.test(tr)) {
                    let items = [];
                    while (i < lines.length && /^[-*•]\s/.test(lines[i].trim()) && lines[i].trim()) {
                        items.push(lines[i].trim().replace(/^[-*•]\s/, ""));
                        i++;
                    }
                    html += `<ul>${items.map(x => `<li>${this.renderInline(x)}</li>`).join("")}</ul>`;
                    continue;
                }
                if (/^\d+[.)]\s/.test(tr)) {
                    let items = [];
                    while (i < lines.length && /^\d+[.)]\s/.test(lines[i].trim()) && lines[i].trim()) {
                        items.push(lines[i].trim().replace(/^\d+[.)]\s/, ""));
                        i++;
                    }
                    html += `<ol>${items.map(x => `<li>${this.renderInline(x)}</li>`).join("")}</ol>`;
                    continue;
                }
                let pLines = [];
                while (i < lines.length) {
                    const l = lines[i].trim();
                    if (!l || /^#{1,6}\s/.test(l) || /^[-*•]\s/.test(l) || /^\d+[.)]\s/.test(l) || /^__CB\d+__$/.test(l) || /^-{3,}$/.test(l)) break;
                    pLines.push(l);
                    i++;
                }
                if (pLines.length) html += `<p>${pLines.map(l => this.renderInline(l)).join("<br>")}</p>`;
            }
            return html;
        },
        formatConversationTime(v) {
            if (!v) return "";
            const d = new Date(v), n = new Date();
            return new Intl.DateTimeFormat("es-ES", d.toDateString() === n.toDateString()
                ? { hour: "2-digit", minute: "2-digit" }
                : { day: "2-digit", month: "short" }
            ).format(d);
        },
        fmtTime(v) {
            if (!v) return "ahora";
            return new Intl.DateTimeFormat("es-ES", { hour: "2-digit", minute: "2-digit" }).format(new Date(v));
        },
        async boot() {
            this.save();
            await this.fetchConvs();
            const exists = this.conversations.find(c => c.session_id === this.config.sessionId);
            if (exists) await this.loadConv(this.config.sessionId);
            else { this.messages = []; this.scroll(true); }
        },
        async fetchConvs() {
            try {
                const r = await fetch(`${this.config.apiUrl}/conversations?limit=100`);
                this.conversations = r.ok ? await r.json() : [];
            } catch { this.conversations = []; }
        },
        async selectConversation(id) {
            if (id === this.config.sessionId && this.messages.length) { this.closeSidebar(); return; }
            await this.loadConv(id);
        },
        async loadConv(id) {
            this.loadingConversation = true;
            this.config.sessionId = id;
            this.save();
            try {
                const r = await fetch(`${this.config.apiUrl}/conversations/${id}`);
                if (r.status === 404) { this.messages = []; }
                else if (r.ok) { this.messages = (await r.json()).messages || []; }
                await this.fetchConvs();
                this.closeSidebar();
                await this.scroll(true);
            } catch { this.messages = []; }
            finally { this.loadingConversation = false; }
        },
        async deleteConversation(id) {
            try {
                await fetch(`${this.config.apiUrl}/conversations/${id}`, { method: "DELETE" });
                this.conversations = this.conversations.filter(c => c.session_id !== id);
                if (id === this.config.sessionId) this.startNewConversation();
            } catch {}
        },
        startNewConversation() {
            this.config.sessionId = genId();
            this.messages = [];
            this.save();
            this.closeSidebar();
            nextTick(() => this.$refs.composerInput?.focus());
        },
        autoResize() {
            const el = this.$refs.composerInput;
            if (!el) return;
            el.style.height = "auto";
            el.style.height = Math.min(el.scrollHeight, 140) + "px";
        },
        async sendMessage() {
            const text = this.draft.trim();
            if (!text || this.sending) return;
            this.messages.push({ role: "user", content: text, created_at: new Date().toISOString() });
            this.draft = "";
            this.sending = true;
            this.typing = true;
            this.autoResize();
            await this.scroll(true);
            try {
                const r = await fetch(`${this.config.apiUrl}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        session_id: this.config.sessionId,
                        message: text,
                        username: this.config.username || undefined,
                        metadata: (() => { try { const p = JSON.parse(this.config.metadata || "{}"); return typeof p === "object" && p ? p : {}; } catch { return {}; } })()
                    })
                });
                if (!r.ok) throw new Error();
                const data = await r.json();
                this.messages.push({ role: "assistant", content: data.response, created_at: new Date().toISOString() });
                await this.fetchConvs();
            } catch {
                this.messages.push({ role: "assistant", content: "Error de conexión con la API.", created_at: new Date().toISOString() });
            } finally {
                this.typing = false;
                this.sending = false;
                await this.scroll(true);
            }
        },
        async scroll(force) {
            await nextTick();
            const v = this.$refs.messageViewport;
            if (!v) return;
            if (force || v.scrollHeight - v.scrollTop - v.clientHeight < 120)
                v.scrollTop = v.scrollHeight;
        }
    }
}).mount("#app");

window._copy = async (id, btn) => {
    const el = document.getElementById(id);
    if (!el) return;
    try {
        await navigator.clipboard.writeText(el.textContent || "");
        btn.textContent = "Copiado";
        setTimeout(() => btn.textContent = "Copiar", 1200);
    } catch {
        btn.textContent = "Error";
        setTimeout(() => btn.textContent = "Copiar", 1200);
    }
};
</script>
