services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      MULTIAGENT_PG_HOST: ${DOCKER_MULTIAGENT_PG_HOST:-db}
      MULTIAGENT_PG_PORT: ${DOCKER_MULTIAGENT_PG_PORT:-5432}
      MULTIAGENT_PG_DB: ${DOCKER_MULTIAGENT_PG_DB:-multiagente}
      MULTIAGENT_PG_USER: ${DOCKER_MULTIAGENT_PG_USER:-admin}
      MULTIAGENT_PG_PASSWORD: ${DOCKER_MULTIAGENT_PG_PASSWORD:-multi-claw-dev}
      MULTIAGENT_PG_SCHEMA: ${MULTIAGENT_PG_SCHEMA:-multiagente}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      REDIS_CONTEXT_TTL_SECONDS: ${REDIS_CONTEXT_TTL_SECONDS:-86400}
      WORKING_PATH: /app/working-dir
      USER_PREFERENCES_PATH: /app/working-dir/memory/user_preferences.txt
      SESSIONS_PATH: /app/working-dir/sessions
      CRONS_PATH: /app/working-dir/cron-agents
      WORKFLOW_PATH: /app/working-dir/workflows
      ALLOWED_WRITE_ROOTS: /app/working-dir,/tmp
      TWILIO_VALIDATE_SIGNATURE: ${TWILIO_VALIDATE_SIGNATURE:-true}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_ALLOWED_FROM: ${TWILIO_ALLOWED_FROM:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      CHAT_API_KEY: ${CHAT_API_KEY:-}
    volumes:
      - ${WORKING_PATH_HOST:-./working-dir}:/app/working-dir
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DOCKER_MULTIAGENT_PG_DB:-multiagente}
      POSTGRES_USER: ${DOCKER_MULTIAGENT_PG_USER:-admin}
      POSTGRES_PASSWORD: ${DOCKER_MULTIAGENT_PG_PASSWORD:-multi-claw-dev}
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d multiagente"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  redis-data:
