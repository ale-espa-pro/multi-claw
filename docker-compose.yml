services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      MULTIAGENT_PG_HOST: db
      MULTIAGENT_PG_PORT: "5432"
      MULTIAGENT_PG_DB: multiagente
      MULTIAGENT_PG_USER: admin
      MULTIAGENT_PG_PASSWORD: multi-claw-dev
      MULTIAGENT_PG_SCHEMA: multiagente
      REDIS_URL: redis://redis:6379
      WORKING_PATH: /tmp/planner
      USER_PREFERENCES_PATH: /tmp/planner/user_preferences.txt
      CRONS_PATH: /tmp/planner/crons
      WORKFLOW_PATH: /tmp/planner/workflows
      TWILIO_VALIDATE_SIGNATURE: ${TWILIO_VALIDATE_SIGNATURE:-true}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_ALLOWED_FROM: ${TWILIO_ALLOWED_FROM:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      CHAT_API_KEY: ${CHAT_API_KEY:-}
    volumes:
      - planner-workspace:/tmp/planner
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: multiagente
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: multi-claw-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d multiagente"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  redis-data:
  planner-workspace:
